name: Update Blog Posts

on:
  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Test curl
        run: |
          curl -v https://misslogs.klka.in/index.xml
    
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Update README
        run: python scripts/update_blog.py

      - name: Commit changes
        run: |
          git config user.name "KLKA"
          git config user.email "83089446+kamalkoranga@users.noreply.github.com"

          git add README.md

          git diff --cached --quiet || git commit -m "Update latest blog posts"

          git push
